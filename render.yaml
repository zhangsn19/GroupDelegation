# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: hci-experiment
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: LLM_BASE_URL
        value: https://api.gpt.ge/v1
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: LLM_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        generateValue: true
    disk:
      name: hci-session-data
      mountPath: /var/data
      sizeGB: 1
