<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Group Deception Study 2 管理端</title>
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body>
    <main class="admin-page">
      <section class="panel">
        <div class="section-kicker">Admin</div>
        <h1>Study 2 管理端导出</h1>
        <p class="muted">输入 `ADMIN_TOKEN` 后查看计数并下载导出表。</p>
        <label class="field-label" for="admin-token">管理员 token</label>
        <input id="admin-token" class="text-input" type="password" autocomplete="off">
        <label class="consent-check"><input id="include-test" type="checkbox"><span>包含测试 / 调试数据</span></label>
        <label class="field-label" for="filter-condition">condition</label>
        <select id="filter-condition" class="text-input">
          <option value="all">全部</option>
          <option value="hidden">hidden</option>
          <option value="honest">honest</option>
          <option value="dishonest">dishonest</option>
        </select>
        <label class="field-label" for="start-date">开始日期</label>
        <input id="start-date" class="text-input" type="date">
        <label class="field-label" for="end-date">结束日期</label>
        <input id="end-date" class="text-input" type="date">
        <div class="action-row">
          <button id="load-summary" class="primary-button">查看汇总</button>
        </div>
      </section>
      <section class="panel">
        <h2>汇总</h2>
        <pre id="summary-output" class="code-output">尚未加载。</pre>
        <div id="export-links" class="export-grid"></div>
      </section>
    </main>
    <script>
      const tokenInput = document.querySelector("#admin-token");
      const summaryOutput = document.querySelector("#summary-output");
      const links = document.querySelector("#export-links");
      const exportsList = [
        ["JSON 原始数据", "/api/admin/export/json"],
        ["participants.csv", "/api/admin/export/participants.csv"],
        ["study2_effort_rounds.csv", "/api/admin/export/study2_effort_rounds.csv"],
        ["study2_income_reports.csv", "/api/admin/export/study2_income_reports.csv"]
      ];
      document.querySelector("#load-summary").addEventListener("click", async () => {
        const token = tokenInput.value.trim();
        const response = await fetch(`/api/admin/summary?${queryString()}`, {
          headers: { "x-admin-token": token }
        });
        const data = await response.json();
        summaryOutput.textContent = JSON.stringify(data, null, 2);
        links.innerHTML = exportsList.map(([label, href]) => (
          `<button class="secondary-button" data-export="${href}">${label}</button>`
        )).join("");
      });
      links.addEventListener("click", async (event) => {
        const button = event.target.closest("[data-export]");
        if (!button) return;
        const token = tokenInput.value.trim();
        const href = button.dataset.export;
        const response = await fetch(`${href}?${queryString()}`, {
          headers: { "x-admin-token": token }
        });
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = href.split("/").pop();
        a.click();
        URL.revokeObjectURL(url);
      });
      function queryString() {
        const params = new URLSearchParams();
        params.set("condition", document.querySelector("#filter-condition").value);
        if (document.querySelector("#include-test").checked) params.set("include_test", "true");
        if (document.querySelector("#start-date").value) params.set("start_date", document.querySelector("#start-date").value);
        if (document.querySelector("#end-date").value) params.set("end_date", document.querySelector("#end-date").value);
        return params.toString();
      }
    </script>
  </body>
</html>
