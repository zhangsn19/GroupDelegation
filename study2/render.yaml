services:
  - type: web
    name: group-deception-study2
    env: node
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data/sessions
      - key: DEBUG_LINKS
        value: false
      - key: REQUIRE_PARTICIPANT_ID
        value: true
      - key: ADMIN_TOKEN
        sync: false
      - key: COMPLETION_CODE
        sync: false
      - key: COMPLETION_REDIRECT_URL
        sync: false
    disk:
      name: study2-data
      mountPath: /var/data
